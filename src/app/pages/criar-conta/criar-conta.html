<div class="container d-flex justify-content-center align-items-center vh-100 bg-light">
  <div class="card p-4 shadow-lg border-0" style="width: 100%; max-width: 450px; border-radius: 1rem;">

    <div class="text-center mb-4">
      <h1 class="text-danger fw-bold mb-0">🍔 FomeDeGue</h1>
      <p class="text-muted mt-2">Crie sua conta para começar a pedir</p>
    </div>

    <form>
      <div class="mb-3">
        <label for="nome" class="form-label fw-semibold text-dark">Nome completo</label>
        <input type="text" class="form-control form-control-lg bg-light" id="nome" placeholder="Seu nome completo">
      </div>

      <div class="mb-3">
        <label for="email" class="form-label fw-semibold text-dark">E-mail</label>
        <input type="email" class="form-control form-control-lg bg-light" id="email" placeholder="seu@email.com">
      </div>

      <div class="mb-3">
        <label for="senha" class="form-label fw-semibold text-dark">Senha</label>
        <input type="password" class="form-control form-control-lg bg-light" id="senha" placeholder="Crie uma senha forte">
      </div>

      <div class="mb-4">
        <label for="confirmarSenha" class="form-label fw-semibold text-dark">Confirmar senha</label>
        <input type="password" class="form-control form-control-lg bg-light" id="confirmarSenha" placeholder="Repita a senha">
      </div>

      <div class="d-grid mt-2">
        <button type="button" class="btn btn-danger btn-lg fw-bold rounded-pill shadow-sm">Criar minha conta</button>
      </div>

      <div class="text-center mt-4">
        <span class="text-muted">Já é cadastrado? </span>
        <a href="#" class="text-danger text-decoration-none fw-bold">Fazer Login</a>
      </div>
    </form>

  </div>
</div>
