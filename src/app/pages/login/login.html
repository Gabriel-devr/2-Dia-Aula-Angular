<div class="container d-flex justify-content-center align-items-center vh-100 bg-light">
  <div class="card p-4 shadow-lg border-0" style="width: 100%; max-width: 400px; border-radius: 1rem;">

    <div class="text-center mb-4">
      <h1 class="text-danger fw-bold mb-0">🍔 FomeDeGue</h1>
      <p class="text-muted mt-2">Acesse para pedir sua comida</p>
    </div>

    <form>
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold text-dark">E-mail</label>
        <input type="email" class="form-control form-control-lg bg-light" id="email" placeholder="seu@email.com">
      </div>

      <div class="mb-4">
        <label for="senha" class="form-label fw-semibold text-dark">Senha</label>
        <input type="password" class="form-control form-control-lg bg-light" id="senha" placeholder="Sua senha">
      </div>

      <div class="d-grid mt-2">
        <button routerLink="/home" type="button" class="btn btn-danger btn-lg fw-bold rounded-pill shadow-sm">Entrar no App</button>
      </div>

      <div class="text-center mt-4">
        <span class="text-muted">A fome bateu e não tem cadastro? </span>
        <a routerLink="/criar-conta" class="text-danger text-decoration-none fw-bold">Criar Conta</a>
      </div>
    </form>

  </div>
</div>
